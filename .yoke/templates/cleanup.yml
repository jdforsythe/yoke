version: "1"

template:
  name: yoke-cleanup
  description: "Testing-gap cleanup pipeline — closes coverage gaps for InitialPromptRenderer, NodeSummaryPanel, graph finalization, ?view=graph routing, and PrepostOutputPane. Parallel-safe (no depends_on), exercises list view / graph view / prepost-output surfaces concurrently."

pipeline:
  stages:
    - id: bootstrap
      description: "Implement + review each test-coverage cleanup item. Items are independent; expect concurrency up to the configured limit."
      run: per-item
      items_from: docs/idea/cleanup-features.json
      items_list: "$.features"
      items_id: "$.id"
      items_depends_on: "$.depends_on"
      items_display:
        title: "$.id"
        subtitle: "$.category"
        description: "$.description"
      phases:
        - implement
        - review

phases:
  implement:
    description: "Write the coverage test(s), run the suite, commit in small batches."
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
      - "--model"
      - "claude-sonnet-4-6"
    prompt_template: prompts/self-host-implement.md
    max_outer_retries: 2
    retry_ladder:
      - continue
      - fresh_with_failure_summary
      - awaiting_user
    post:
      - name: check-handoff
        run: ["node", "scripts/check-handoff-json.js"]
        timeout_s: 10
        actions:
          "0": continue
          "*":
            retry:
              mode: fresh_with_failure_summary
              max: 2
      - name: run-tests
        run: ["pnpm", "test"]
        timeout_s: 300
        actions:
          "0": continue
          "*":
            retry:
              mode: fresh_with_failure_summary
              max: 2
      - name: run-typecheck
        run: ["pnpm", "typecheck"]
        timeout_s: 60
        actions:
          "0": continue
          "*":
            retry:
              mode: fresh_with_failure_summary
              max: 2

  review:
    description: "Read-only verdict on AC/RC with file:line citations; writes review-verdict.json."
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
      - "--model"
      - "claude-sonnet-4-6"
    prompt_template: prompts/self-host-review.md
    post:
      - name: check-handoff
        run: ["node", "scripts/check-handoff-json.js"]
        timeout_s: 10
        actions:
          "0": continue
          "*":
            retry:
              mode: fresh_with_failure_summary
              max: 2
      - name: check-verdict
        run: ["node", "scripts/check-review-verdict.js"]
        timeout_s: 10
        actions:
          "0": continue
          "1":
            goto: implement
            max_revisits: 3
          "*": continue

worktrees:
  base_dir: .worktrees
  branch_prefix: yoke-cleanup/
  bootstrap:
    commands:
      - "pnpm install"

github:
  enabled: true
  auto_pr: true
  pr_target_branch: master
  auth_order:
    - env:GITHUB_TOKEN
    - gh:auth:token

runtime:
  keep_awake: true

rate_limit:
  handling: passive
