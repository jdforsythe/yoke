version: "1"

template:
  name: content-pipeline
  description: "Outline → per-chapter draft + edit. The outline phase decomposes a creative brief into docs/idea/content-pipeline-chapters.json; each chapter flows through draft + edit with FAIL → goto draft. Best for: long-form writing (book, course, manual) where each chapter is independently reviewable."

pipeline:
  stages:
    - id: outline
      description: "Run-once outliner. Reads docs/idea/content-pipeline-brief.md, writes docs/idea/content-pipeline-chapters.json."
      run: once
      phases:
        - outline

    - id: write
      description: "Per-chapter draft + edit with FAIL → goto draft (max 3 revisits)."
      run: per-item
      items_from: docs/idea/content-pipeline-chapters.json
      items_list: "$.features"
      items_id: "$.id"
      items_depends_on: "$.depends_on"
      items_display:
        title: "$.id"
        subtitle: "$.category"
        description: "$.description"
      phases:
        - draft
        - edit

phases:
  outline:
    description: "Decompose docs/idea/content-pipeline-brief.md into a chapter manifest."
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
      - "--model"
      - "claude-sonnet-4-6"
    prompt_template: prompts/outline.md
    max_outer_retries: 2
    retry_ladder:
      - continue
      - fresh_with_failure_summary
      - awaiting_user
    post:
      - name: check-features-json
        run: ["node", "scripts/check-features-json.js", "docs/idea/content-pipeline-chapters.json"]
        timeout_s: 30
        actions:
          "0": continue
          "1":
            retry:
              mode: fresh_with_failure_summary
              max: 2
          "2":
            goto: outline
            max_revisits: 3
          "*": stop-and-ask

  draft:
    description: "Write a single chapter as markdown. Append a handoff entry on stop."
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
      - "--model"
      - "claude-sonnet-4-6"
    prompt_template: prompts/draft.md
    max_outer_retries: 2
    retry_ladder:
      - continue
      - fresh_with_failure_summary
      - awaiting_user
    post:
      - name: check-handoff
        run: ["node", "scripts/check-handoff-json.js"]
        timeout_s: 10
        actions:
          "0": continue
          "*": continue
      - name: check-output-nonempty
        # Domain "tests" gate: assert the chapter file exists and is non-empty.
        # The file is named after the item id at chapters/<id>.md.
        run: ["node", "scripts/check-output-nonempty.js"]
        timeout_s: 10
        actions:
          "0": continue
          "*":
            retry:
              mode: fresh_with_failure_summary
              max: 2

  edit:
    description: "Editorial pass: read-only verdict against the chapter brief. Writes review-verdict.json."
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
      - "--model"
      - "claude-sonnet-4-6"
    prompt_template: prompts/edit.md
    max_outer_retries: 2
    retry_ladder:
      - continue
      - fresh_with_failure_summary
      - awaiting_user
    post:
      - name: check-handoff
        run: ["node", "scripts/check-handoff-json.js"]
        timeout_s: 10
        actions:
          "0": continue
          "*": continue
      - name: check-verdict
        run: ["node", "scripts/check-review-verdict.js"]
        timeout_s: 10
        actions:
          "0": continue
          "1":
            goto: draft
            max_revisits: 3
          "*": stop-and-ask

worktrees:
  base_dir: .worktrees
  branch_prefix: content-pipeline/

runtime:
  keep_awake: true

rate_limit:
  handling: passive
