name: release

# Triggered by pushing a v*.*.* tag. Verifies the tag matches package.json,
# runs the full quality gate (typecheck + tests + build), publishes to npm
# with provenance, and creates a GitHub Release with auto-generated notes.
#
# One-time setup before the first run:
#   1. Generate an npm Automation token: https://www.npmjs.com/settings/<you>/tokens
#   2. Add it as a repo secret named NPM_TOKEN.
#
# Trigger:
#   git tag -a v0.1.0 -m "Yoke v0.1.0"
#   git push origin v0.1.0

on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    name: Publish to npm + create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write       # for the GitHub Release
      id-token: write       # for npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Releasing version $PKG"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (server + web + assets)
        run: pnpm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
