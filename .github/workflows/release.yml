name: release

# Triggered by pushing a v*.*.* tag — typically by publishing the draft
# release that release-drafter maintains. Sets package.json to the tag
# version, runs the full quality gate (typecheck + tests + build), publishes
# to npm via OIDC Trusted Publishing (no token, no MFA bypass), and updates
# the GitHub Release (preserving release-drafter's curated notes).
#
# One-time setup before the first run — configure the package's trusted
# publisher on npmjs.com:
#   https://www.npmjs.com/settings/<scope-or-user>/publishing-access
#   • Repository owner:   jdforsythe
#   • Repository name:    yoke
#   • Workflow filename:  release.yml
#   • Environment:        (leave empty unless you add one to this workflow)
#
# Normal trigger: publish the draft release in the GitHub UI. GitHub creates
# the tag at master HEAD and fires the push:tag event below.
#
# Manual trigger (bypassing the draft):
#   git tag -a v0.1.0 -m "Yoke v0.1.0"
#   git push origin v0.1.0

on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    name: Publish to npm + create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write       # for the GitHub Release
      id-token: write       # for npm provenance attestation
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # OIDC Trusted Publishing requires npm >= 11.5.1; Node 22 ships with
      # npm 10. Upgrade in-place before publish.
      #
      # Pinned to a specific version (not @latest) to dodge a self-replace
      # race that surfaces intermittently as `Cannot find module
      # 'promise-retry'`: when npm overwrites itself in /opt/hostedtoolcache
      # mid-install, an in-flight require() can land between unlink and
      # rewrite. Pinning + the workaround retry below keeps it deterministic.
      # Bump this pin when there's a reason to (e.g. a newer OIDC behaviour);
      # don't switch back to @latest.
      - name: Upgrade npm CLI for OIDC publishing
        run: |
          set -euo pipefail
          # Retry once if the self-replace race trips. The second attempt
          # runs against a clean(er) tree because the first largely succeeded.
          npm install -g npm@11.5.1 || npm install -g npm@11.5.1
          npm --version

      - run: pnpm install --frozen-lockfile

      # The tag is the source of truth for the release version. With the
      # release-drafter flow, package.json on master still has the previous
      # version when the draft is published, so we write the tag's version
      # into package.json in-workspace (no commit) so `npm publish` picks it
      # up. This step is a no-op when the two already match (e.g. a manual
      # tag push after a version-bump PR).
      - name: Set package.json version from tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$PKG" != "$TAG" ]; then
            echo "Bumping package.json from $PKG to $TAG (in-workspace, not committed)"
            npm version "$TAG" --no-git-tag-version --allow-same-version
          else
            echo "package.json already at $TAG"
          fi
          echo "Releasing version $TAG"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (server + web + assets)
        run: pnpm run build

      # OIDC Trusted Publishing: no NODE_AUTH_TOKEN. The id-token: write
      # permission above lets npm exchange a GitHub OIDC token for a
      # short-lived publish credential — provided npmjs.com has a trusted
      # publisher configured for this package + repo + workflow filename.
      #
      # Idempotency guard: if the version is already on the registry (e.g.
      # the very first release was published manually to bootstrap the
      # trusted-publisher config), skip the publish step instead of failing.
      # This keeps the workflow re-runnable and lets v0.1.0 still produce a
      # GitHub Release in the next step.
      - name: Publish to npm (OIDC, skip if already published)
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "::notice::${PKG}@${VER} is already on the registry — skipping publish."
          else
            npm publish --access public --provenance
          fi

      # When the draft is published, the Release already exists with
      # release-drafter's curated body. softprops/action-gh-release@v2
      # updates the existing release in that case; we deliberately omit
      # `body` and `generate_release_notes` so drafter's notes are preserved.
      # On a manual tag-push (no pre-existing release), this creates a new
      # Release with an empty body — fine for the bypass path.
      - name: Ensure GitHub Release exists for tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
