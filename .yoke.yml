version: "1"

project:
  name: yoke

# ---------------------------------------------------------------------------
# Pipeline — ε self-hosting: drive the dashboard via the v1 harness.
#
# All Phase δ features (including feat-workflow-display-name and
# feat-workflow-run-files) are complete. This pipeline now targets
# docs/idea/dashboard-features.json via a single run:per-item stage.
#
# items_complete: "$.status" — evaluated per item at seed time. Items with
# status:"complete" are seeded into SQLite as pre-marked done and skipped by
# the scheduler. Fresh items have no status field → falsy → seeded as pending.
# When a feature completes, mark it status:"complete" in dashboard-features.json.
#
# DO NOT use an items_list JSONPath filter instead (e.g. [?(@.status !=
# 'complete')]). Filtered items never get SQLite rows, which breaks the
# dependency graph and isResume semantics. items_complete seeds all items
# but pre-marks the done ones — SQLite remains the authoritative record.
# ---------------------------------------------------------------------------

pipeline:
  stages:
    - id: dashboard-features
      run: per-item
      items_from: docs/idea/dashboard-features.json
      items_list: "$.features"
      items_id: "$.id"
      items_depends_on: "$.depends_on"
      items_complete: "$.status"
      items_display:
        title: "$.id"
        subtitle: "$.category"
      phases:
        - implement
        - review

# ---------------------------------------------------------------------------
# Phase definitions
# ---------------------------------------------------------------------------

phases:
  implement:
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
    prompt_template: prompts/self-host-implement.md
    max_outer_retries: 2
    retry_ladder:
      - continue
      - fresh_with_failure_summary
      - awaiting_user
    post:
      - name: run-tests
        run: ["pnpm", "test"]
        timeout_s: 120
        actions:
          "0": continue
          "*":
            retry:
              mode: fresh_with_failure_summary
              max: 2
      - name: run-typecheck
        run: ["pnpm", "typecheck"]
        timeout_s: 60
        actions:
          "0": continue
          "*":
            retry:
              mode: fresh_with_failure_summary
              max: 2

  review:
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
    prompt_template: prompts/self-host-review.md
    post:
      - name: check-verdict
        run: ["python3", "scripts/check-review-verdict.py"]
        timeout_s: 10
        actions:
          "0": continue
          "1":
            goto: implement
            max_revisits: 3
          "*": continue

# ---------------------------------------------------------------------------
# Worktrees
#
# Bootstrap symlinks the repo-root node_modules so each worktree can run
# tests without a full npm install. Safe here because all stages build the
# same package and no stage adds new npm dependencies.
# ---------------------------------------------------------------------------

worktrees:
  base_dir: .worktrees
  branch_prefix: yoke/
  bootstrap:
    commands:
      - "ln -sf $(git rev-parse --show-toplevel)/node_modules node_modules"

# ---------------------------------------------------------------------------
# Runtime / operational
# ---------------------------------------------------------------------------

runtime:
  keep_awake: true

rate_limit:
  handling: passive
