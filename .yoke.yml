version: "1"

project:
  name: yoke

# ---------------------------------------------------------------------------
# Pipeline — ε self-hosting: drive the dashboard via the v1 harness.
#
# All Phase δ features (including feat-workflow-display-name and
# feat-workflow-run-files) are complete. This pipeline now targets
# docs/idea/dashboard-features.json via a single run:per-item stage.
#
# items_complete: "$.status" — evaluated per item at seed time. Items with
# status:"complete" are seeded into SQLite as pre-marked done and skipped by
# the scheduler. Fresh items have no status field → falsy → seeded as pending.
# When a feature completes, mark it status:"complete" in dashboard-features.json.
#
# DO NOT use an items_list JSONPath filter instead (e.g. [?(@.status !=
# 'complete')]). Filtered items never get SQLite rows, which breaks the
# dependency graph and isResume semantics. items_complete seeds all items
# but pre-marks the done ones — SQLite remains the authoritative record.
# ---------------------------------------------------------------------------

pipeline:
  stages:
    - id: plan
      run: once
      phases:
        - planner

    - id: dashboard-features
      run: per-item
      items_from: docs/idea/dashboard-features.json
      items_list: "$.features"
      items_id: "$.id"
      items_depends_on: "$.depends_on"
      items_complete: "$.status"
      items_display:
        title: "$.id"
        subtitle: "$.category"
      phases:
        - implement
        - review

# ---------------------------------------------------------------------------
# Phase definitions
# ---------------------------------------------------------------------------

phases:
  planner:
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
      - "--model"
      - "claude-opus-4-6"
    prompt_template: prompts/plan-dashboard.md
    max_outer_retries: 2
    retry_ladder:
      - continue
      - fresh_with_failure_summary
      - awaiting_user
    post:
      - name: check-features
        run: ["node", "scripts/check-features-json.js", "docs/idea/dashboard-features.json"]
        timeout_s: 15
        actions:
          "0": continue
          "*":
            goto: planner
            max_revisits: 3

  implement:
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
      - "--model"
      - "claude-sonnet-4-6"
    prompt_template: prompts/self-host-implement.md
    max_outer_retries: 2
    retry_ladder:
      - continue
      - fresh_with_failure_summary
      - awaiting_user
    post:
      - name: run-tests
        run: ["pnpm", "test"]
        timeout_s: 120
        actions:
          "0": continue
          "*":
            retry:
              mode: fresh_with_failure_summary
              max: 2
      - name: run-typecheck
        run: ["pnpm", "typecheck"]
        timeout_s: 60
        actions:
          "0": continue
          "*":
            retry:
              mode: fresh_with_failure_summary
              max: 2
      - name: check-handoff
        run: ["node", "scripts/check-handoff-json.js"]
        timeout_s: 10
        actions:
          "0": continue
          "*": continue

  review:
    command: claude
    args:
      - "-p"
      - "--output-format"
      - "stream-json"
      - "--verbose"
      - "--dangerously-skip-permissions"
      - "--model"
      - "claude-sonnet-4-6"
    prompt_template: prompts/self-host-review.md
    post:
      - name: check-handoff
        run: ["node", "scripts/check-handoff-json.js"]
        timeout_s: 10
        actions:
          "0": continue
          "*": continue
      - name: check-verdict
        run: ["node", "scripts/check-review-verdict.js"]
        timeout_s: 10
        actions:
          "0": continue
          "1":
            goto: implement
            max_revisits: 3
          "*": continue
      - name: mark-complete
        run: ["node", "scripts/mark-feature-complete.js"]
        timeout_s: 10
        actions:
          "0": continue
          "*": continue

# ---------------------------------------------------------------------------
# Worktrees
#
# Bootstrap runs pnpm install in the worktree so each worktree gets its own
# isolated node_modules. This avoids cross-contamination between the main
# workspace and the worktree (e.g. missing direct deps not in the worktree's
# package.json still being resolvable via the main workspace's store).
# ---------------------------------------------------------------------------

worktrees:
  base_dir: .worktrees
  branch_prefix: yoke/
  bootstrap:
    commands:
      - "pnpm install"

# ---------------------------------------------------------------------------
# Runtime / operational
# ---------------------------------------------------------------------------

runtime:
  keep_awake: true

rate_limit:
  handling: passive
